name: Distribute PushOk - Reusable

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      app_ref:
        required: false
        type: string
        default: ""
    secrets:
      GITLAB_TRIGGER_TOKEN:
        required: true


jobs:
  distribution:
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Get last 3 commit messages
        run: |
          commits=$(git log -3 --pretty=format:"%s")
          echo "commits<<EOF" >> "$GITHUB_ENV"
          echo "$commits"     >> "$GITHUB_ENV"
          echo "EOF"          >> "$GITHUB_ENV"

      - name: Get Mindbox SDK Version
        run: |
          sdkVersion=$(grep 'static let sdkVersion' SDKVersionProvider/SDKVersionProvider.swift | awk -F '"' '{print $2}')
          echo "sdkVersion=$sdkVersion" >> "$GITHUB_ENV"

      - name: Print environment variables for debugging
        run: |
          echo "Debugging variables:"
          echo "github.event_name: ${{ github.event_name }}"
          echo "github.ref: ${{ github.ref }}"
          echo "github.head_ref: ${{ github.head_ref }}"
          echo "inputs.branch: ${{ inputs.branch }}"
          echo "commits: ${{ env.commits }}"
          echo "sdkVersion: ${{ env.sdkVersion }}"

      - name: Trigger build workflow in ios-app repo (override -> same -> develop)
        env:
          GITLAB_HOST: mindbox.gitlab.yandexcloud.net
          APP_PROJECT_ID: "1021"
          DEFAULT_APP_REF: develop

          SOURCE_BRANCH: ${{ inputs.branch }}   # ветка SDK (и "same branch" для App)
          APP_REF_OVERRIDE: ${{ inputs.app_ref }}

          GITLAB_TRIGGER_TOKEN: ${{ secrets.GITLAB_TRIGGER_TOKEN }}

          INPUT_COMMITS: ${{ env.commits }}
          INPUT_SDK_VERSION: ${{ env.sdkVersion }}
        shell: bash
        run: |
          set -euo pipefail

          trigger_pipeline() {
            local ref="$1"
            local tmp_body
            tmp_body="$(mktemp)"

            local code
            code="$(curl -sS -o "$tmp_body" -w '%{http_code}' --location \
              --retry 3 --retry-all-errors --retry-delay 2 \
              "https://${GITLAB_HOST}/api/v4/projects/${APP_PROJECT_ID}/trigger/pipeline" \
              --form "token=${GITLAB_TRIGGER_TOKEN}" \
              --form "ref=${ref}" \
              --form "variables[INPUT_BRANCH]=${SOURCE_BRANCH}" \
              --form "variables[INPUT_COMMITS]=${INPUT_COMMITS}" \
              --form "variables[INPUT_SDK_VERSION]=${INPUT_SDK_VERSION}")"

            local body
            body="$(cat "$tmp_body" 2>/dev/null || true)"

            echo "Trigger HTTP: $code (ref=$ref)"
            echo "Response body:"
            echo "$body"

            if [[ "$code" == "200" || "$code" == "201" ]]; then
              rm -f "$tmp_body"
              return 0
            fi

            if [[ "$code" == "401" || "$code" == "403" ]]; then
              echo "Auth error (HTTP $code). Check that GITLAB_TRIGGER_TOKEN is valid and has access to project ${APP_PROJECT_ID}."
              rm -f "$tmp_body"
              return 1
            fi

            # Missing ref: GitLab returns 400 + "Reference not found"
            if [[ "$code" == "400" || "$code" == "404" ]]; then
              if [[ "$body" == *"Reference not found"* ]]; then
                rm -f "$tmp_body"
                return 2
              fi

              echo "Got HTTP $code but it's NOT 'Reference not found'."
              echo "This can happen if pipelines are blocked for triggers by workflow:rules or job rules when CI_PIPELINE_SOURCE == 'trigger'."
              rm -f "$tmp_body"
              return 1
            fi

            if [[ "$code" =~ ^5[0-9][0-9]$ ]]; then
              echo "Server error (HTTP $code). GitLab/proxy might be temporarily unavailable."
              rm -f "$tmp_body"
              return 1
            fi

            echo "Unexpected HTTP status: $code"
            rm -f "$tmp_body"
            return 1
          }

          echo "SDK branch (INPUT_BRANCH): $SOURCE_BRANCH"
          echo "Manual App ref override: ${APP_REF_OVERRIDE:-<empty>}"
          echo "Default App ref: $DEFAULT_APP_REF"

          # Build ordered list of refs to try:
          # - if override is set: override -> same -> develop
          # - else: same -> develop
          refs_to_try=()
          if [[ -n "${APP_REF_OVERRIDE:-}" ]]; then
            refs_to_try+=("$APP_REF_OVERRIDE")
          fi
          refs_to_try+=("$SOURCE_BRANCH")
          refs_to_try+=("$DEFAULT_APP_REF")

          # Deduplicate while preserving order (in case override == source branch, etc.)
          uniq_refs=()
          for r in "${refs_to_try[@]}"; do
            skip=0
            for u in "${uniq_refs[@]}"; do
              if [[ "$u" == "$r" ]]; then
                skip=1
                break
              fi
            done
            [[ "$skip" == "0" ]] && uniq_refs+=("$r")
          done

          echo "Will try App refs in order:"
          for r in "${uniq_refs[@]}"; do
            echo " - $r"
          done

          for r in "${uniq_refs[@]}"; do
            echo "Trying to trigger pipeline on ref: $r"
            trigger_pipeline "$r" && {
              echo "Triggered successfully on ref: $r"
              exit 0
            }
            rc=$?
            if [[ "$rc" == "2" ]]; then
              echo "Ref not found: $r (continuing...)"
              continue
            fi

            echo "Trigger failed for reasons other than missing ref (rc=$rc)."
            exit 1
          done

          echo "All refs not found. Nothing triggered."
          exit 1
