name: Distribute PushOk - Reusable

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
    secrets:
      GITLAB_TRIGGER_TOKEN:
        required: true

jobs:
  distribution:
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Get last 3 commit messages
        run: |
          commits=$(git log -3 --pretty=format:"%s")
          echo "commits<<EOF" >> "$GITHUB_ENV"
          echo "$commits"     >> "$GITHUB_ENV"
          echo "EOF"          >> "$GITHUB_ENV"

      - name: Get Mindbox SDK Version
        run: |
          sdkVersion=$(grep 'static let sdkVersion' SDKVersionProvider/SDKVersionProvider.swift | awk -F '"' '{print $2}')
          echo "sdkVersion=$sdkVersion" >> "$GITHUB_ENV"

      - name: Print environment variables for debugging
        run: |
          echo "Debugging variables:"
          echo "github.event_name: ${{ github.event_name }}"
          echo "github.ref: ${{ github.ref }}"
          echo "github.head_ref: ${{ github.head_ref }}"
          echo "inputs.branch: ${{ inputs.branch }}"
          echo "commits: ${{ env.commits }}"
          echo "sdkVersion: ${{ env.sdkVersion }}"

      - name: Trigger build workflow in ios-app repo (try same branch, fallback to develop)
        env:
          GITLAB_HOST: mindbox.gitlab.yandexcloud.net
          APP_PROJECT_ID: "1021"
          DEFAULT_APP_REF: develop

          SOURCE_BRANCH: ${{ inputs.branch }}
          GITLAB_TRIGGER_TOKEN: ${{ secrets.GITLAB_TRIGGER_TOKEN }}

          INPUT_COMMITS: ${{ env.commits }}
          INPUT_SDK_VERSION: ${{ env.sdkVersion }}
        shell: bash
        run: |
          set -euo pipefail

          trigger_pipeline() {
            local ref="$1"
            local tmp_body
            tmp_body="$(mktemp)"

            local code
            code="$(curl -sS -o "$tmp_body" -w '%{http_code}' --location \
              --retry 3 --retry-all-errors --retry-delay 2 \
              "https://${GITLAB_HOST}/api/v4/projects/${APP_PROJECT_ID}/trigger/pipeline" \
              --form "token=${GITLAB_TRIGGER_TOKEN}" \
              --form "ref=${ref}" \
              --form "variables[INPUT_BRANCH]=${SOURCE_BRANCH}" \
              --form "variables[INPUT_COMMITS]=${INPUT_COMMITS}" \
              --form "variables[INPUT_SDK_VERSION]=${INPUT_SDK_VERSION}")"

            echo "Trigger HTTP: $code (ref=$ref)"

            local body
            body="$(cat "$tmp_body" 2>/dev/null || true)"

            if [[ "$code" == "200" || "$code" == "201" ]]; then
              echo "$body"
              rm -f "$tmp_body"
              return 0
            fi

            echo "Trigger failed. Response body:"
            echo "$body"

            # Fallback ONLY when ref is missing.
            # Your GitLab returns: {"message":{"base":["Reference not found"]}}
            if [[ "$code" == "400" || "$code" == "404" ]]; then
              if [[ "$body" == *"Reference not found"* ]]; then
                rm -f "$tmp_body"
                return 2
              fi
            fi

            rm -f "$tmp_body"
            return 1
          }

          desired_ref="$SOURCE_BRANCH"
          fallback_ref="$DEFAULT_APP_REF"

          echo "Trying to trigger pipeline on ref: $desired_ref"
          trigger_pipeline "$desired_ref" || rc=$?

          # If success, rc is unset; normalize it
          rc="${rc:-0}"

          if [[ "$rc" == "0" ]]; then
            echo "Triggered on desired ref."
            exit 0
          fi

          if [[ "$rc" == "2" ]]; then
            echo "Desired ref not found. Falling back to: $fallback_ref"
            trigger_pipeline "$fallback_ref"
            echo "Triggered on fallback ref."
            exit 0
          fi

          echo "Trigger failed for reasons other than missing ref."
          exit 1
