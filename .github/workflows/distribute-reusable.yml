name: Distribute PushOk - Reusable

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
    secrets:
      GITLAB_TRIGGER_TOKEN:
        required: true
      IOS_APP_GITLAB_API_TOKEN:
        required: true

jobs:
  distribution:
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Get last 3 commit messages
        run: |
          commits=$(git log -3 --pretty=format:"%s")
          echo "commits<<EOF" >> "$GITHUB_ENV"
          echo "$commits"     >> "$GITHUB_ENV"
          echo "EOF"          >> "$GITHUB_ENV"

      - name: Get Mindbox SDK Version
        run: |
          sdkVersion=$(grep 'static let sdkVersion' SDKVersionProvider/SDKVersionProvider.swift | awk -F '"' '{print $2}')
          echo "sdkVersion=$sdkVersion" >> "$GITHUB_ENV"

      - name: Print environment variables for debugging
        run: |
          echo "Debugging variables:"
          echo "github.event_name: ${{ github.event_name }}"
          echo "github.ref: ${{ github.ref }}"
          echo "github.head_ref: ${{ github.head_ref }}"
          echo "inputs.branch: ${{ inputs.branch }}"
          echo "commits: ${{ env.commits }}"
          echo "sdkVersion: ${{ env.sdkVersion }}"

      - name: Trigger build workflow in ios-app repo (same branch if exists, else develop)
        env:
          GITLAB_HOST: mindbox.gitlab.yandexcloud.net
          APP_PROJECT_ID: "1021"
          DEFAULT_APP_REF: develop

          SOURCE_BRANCH: ${{ inputs.branch }}
          GITLAB_TRIGGER_TOKEN: ${{ secrets.GITLAB_TRIGGER_TOKEN }}
          GITLAB_API_TOKEN: ${{ secrets.IOS_APP_GITLAB_API_TOKEN }}

          INPUT_COMMITS: ${{ env.commits }}
          INPUT_SDK_VERSION: ${{ env.sdkVersion }}
        shell: bash
        run: |
          set -euo pipefail

          encode_ref() {
            local s="$1"
            local out=""
            local i c hex
            for (( i=0; i<${#s}; i++ )); do
              c="${s:i:1}"
              case "$c" in
                [a-zA-Z0-9._~-]) out+="$c" ;;
                *) printf -v hex '%%%02X' "'$c"; out+="$hex" ;;
              esac
            done
            echo "$out"
          }

          desired_ref="$SOURCE_BRANCH"
          encoded_ref="$(encode_ref "$desired_ref")"
          branch_url="https://${GITLAB_HOST}/api/v4/projects/${APP_PROJECT_ID}/repository/branches/${encoded_ref}"

          echo "Checking if App branch exists: $desired_ref"
          echo "Branch check URL: $branch_url"

          tmp_body="$(mktemp)"
          http_code="$(curl -sS -o "$tmp_body" -w '%{http_code}' \
            --header "Authorization: Bearer ${GITLAB_API_TOKEN}" \
            "$branch_url")"

          # If your GitLab ever rejects Bearer tokens, switch header to:
          # --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}"

          echo "Branch check HTTP: $http_code"

          case "$http_code" in
            200)
              app_ref="$desired_ref"
              ;;
            404)
              app_ref="$DEFAULT_APP_REF"
              ;;
            401|403)
              echo "Auth error while checking branch (HTTP $http_code). Response:"
              cat "$tmp_body" || true
              exit 1
              ;;
            *)
              echo "Unexpected status while checking branch: HTTP $http_code"
              echo "Response:"
              cat "$tmp_body" || true
              exit 1
              ;;
          esac

          rm -f "$tmp_body" || true

          echo "Selected App ref: $app_ref (fallback: $DEFAULT_APP_REF)"
          echo "Triggering GitLab pipeline..."

          curl -sS --fail --location \
            --retry 3 --retry-all-errors --retry-delay 2 \
            "https://${GITLAB_HOST}/api/v4/projects/${APP_PROJECT_ID}/trigger/pipeline" \
            --form "token=${GITLAB_TRIGGER_TOKEN}" \
            --form "ref=${app_ref}" \
            --form "variables[INPUT_BRANCH]=${SOURCE_BRANCH}" \
            --form "variables[INPUT_COMMITS]=${INPUT_COMMITS}" \
            --form "variables[INPUT_SDK_VERSION]=${INPUT_SDK_VERSION}"

          echo "Done."
