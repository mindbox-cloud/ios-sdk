name: SwiftLint & UnitTests

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - mission/*
      - feature/*
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      
jobs:
  SwiftLint:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/realm/swiftlint:latest
    steps:
    - uses: actions/checkout@v6
    - run: swiftlint --config .swiftlint.yml --reporter github-actions-logging --strict

  build:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v6
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Update bundler
      run: gem install bundler
    - name: Install bundler dependencies
      run: bundle install

    - name: Reduce macOS background load (CI)
      run: |
          sudo launchctl bootout system/com.apple.PerfPowerServices || true
          sudo launchctl bootout system/com.apple.metadata.mds || true

    - name: Install & start yeetd
      run: |
          curl -L https://github.com/biscuitehh/yeetd/releases/download/1.0/yeetd-normal.pkg -o /tmp/yeetd.pkg
          sudo installer -pkg /tmp/yeetd.pkg -target /
          defaults write dev.biscuit.yeetd killapsd true
          yeetd &

    - name: Reset simulators
      run: |
          xcrun simctl shutdown all || true

    - name: Run unit tests
      run: bundle exec fastlane unitTestLane
