<script>
    window.isPopUpFormShown = false;
    window.isQuizReadyChecked = false;
    window.isQuizInitSent = false;
    
    window.isCircularReplacerEnabled = false;
    window.isQuiz = false;

    createCircularReplacer = function() {
        const seen = new WeakSet();
        return function(key, value) {
            if (typeof value === 'object' && value !== null) {
                if (seen.has(value)) {
                    return '[Circular]';
                }
                seen.add(value);
            }
            return value;
        };
    };

    window.stringify = function(value) {
        try {
            if (window.isCircularReplacerEnabled) {
                return JSON.stringify(value, createCircularReplacer());
            }
            return JSON.stringify(value);
        } catch (error) {
            return 'Unserializable Object';
        }
    };

    window.trySendInit = function () {
      console.log('trySendInit called with isQuizInitSent=' + window.isQuizInitSent + ' and isPopUpFormShown=' + window.isPopUpFormShown + ' and isQuizReadyChecked=' + window.isQuizReadyChecked);
        if (window.isQuizInitSent) {
            return;
        }
        if (window.isPopUpFormShown && window.isQuizReadyChecked) {
            window.isQuizInitSent = true;
            sendToSdk('init', 'checkReadyToShow');
            console.log('quizzes.init sent after onFormShow and checkReadyToShow');
        }
    };

    window.sdkBridge.onMessage('quizzes.ready', () => {
      console.log('quizzes.ready called!')
      window.sdkBridge.onMessage('quizzes.closed', () => {
        console.log('quizzes.closed called!')
        sendToSdk('hide', 'final');
        setTimeout(() => {
            sendToSdk('close', 'final');
        }, 1000)
      });
      
      window.sdkBridge.onMessage('quizzes.finalBtnClicked', ({ final }) => {
          console.log(final);
          action = {
              intentPayload: "",
              value: final.data.button.href,
              $type: 'redirectUrl',
          };
          sendToSdk('click', JSON.stringify(action));
          sendToSdk('close', 'after-click');
      });

      const checkReadyToShow = async () => window.sdkBridge.sendMessage('quizzes.checkReadyToShow', {}, { needResponse: true });
      checkReadyToShow().then((data) => {
        window.isQuizReadyChecked = true;
        console.log('quizzes.checkReadyToShow respond received! ' + window.stringify(data));
        window.trySendInit();
      }).catch((error) => {
        str = JSON.stringify(error)
        if (window.isQuiz == 'true') {
            sendToSdk('close', 'error: ' + str);
        }
        console.log('quizzes.checkReadyToShow respond error!', str)
      })
    });
</script>
<script>
    // Send message to Mobile SDK
    function sendToSdk(action, data) {
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.SdkBridge) {
            const message = {
                action: action,
                data: data
            };
            window.webkit.messageHandlers.SdkBridge.postMessage(message);
        } else if (window.SdkBridge && typeof window.SdkBridge.postMessage === 'function') {
            window.SdkBridge.postMessage(action, data);
        } else if (window.__originalConsoleLog) {
            window.__originalConsoleLog('SdkBridge is not found');
        }
    }
</script>

<script>
    // Override console.log to send messages to Mobile SDK
    (function(originalLog) {
        window.__originalConsoleLog = originalLog;

        console.log = function() {
            const message = Array.prototype.slice.call(arguments).map(function(arg) {
                if (typeof arg === 'object' && arg !== null) {
                    return window.stringify(arg);
                }
                return String(arg);
            }).join(' ');

            sendToSdk('log', message);
            originalLog.apply(console, arguments);
        };
    })(console.log);
</script>

<script>
    const sdkBridge = window.SdkBridge;

    if (!sdkBridge || typeof sdkBridge.receiveParam !== 'function') {
        console.log('SdkBridge.receiveParam is not available');
    } else {
        const params = {
            sdkVersion: sdkBridge.receiveParam('sdkVersion'),
            endpointId: sdkBridge.receiveParam('endpointId'),
            popUpEndpointId: sdkBridge.receiveParam('popUpEndpointId'),
            deviceUuid: sdkBridge.receiveParam('deviceUuid'),
            popUpId: sdkBridge.receiveParam('popUpId'),
            wizardId: sdkBridge.receiveParam('wizardId'),
            sdkVersionNumeric: sdkBridge.receiveParam('sdkVersionNumeric'),
            contentUrl: sdkBridge.receiveParam('contentUrl'),
            baseUrl: sdkBridge.receiveParam('baseUrl'),
            isQuiz: sdkBridge.receiveParam('isQuiz')
        };

        console.log('Mobile SDK params: ' + JSON.stringify(params, null, 2));

        document.cookie = 'mindboxDeviceUUID=' + params.deviceUuid;
        window.localStorage.setItem('mindboxDeviceUUID', params.deviceUuid);

        let endpointId = params.endpointId;
        const deviceUuid = params.deviceUuid;
        const popUpId = params.popUpId;
        window.isQuiz = params.isQuiz == 'true' || params.wizardId

        if (params.popUpEndpointId) {
            console.log('popUpEndpointId is set: ' + params.popUpEndpointId);
            endpointId = params.popUpEndpointId;
        } else {
            console.log('popUpEndpointId is not set. Use default endpointId: ' + endpointId);
        }

        console.log('Call window.PopMechanic = window.PopMechanic || {}');
        window.PopMechanic = window.PopMechanic || {};

        if (popUpId) {
            window.PopMechanic.onLoad = function() {
                console.log('PopMechanic onLoad');

                // Check form
                const form = PopMechanic.getModel(popUpId);
                if (!form) {
                    console.log('Form ' + popUpId + ' not found for popUpId');
                    sendToSdk('close', 'form not found');
                } else {
                    if (!isQuiz) {
                        window.isQuizReadyChecked = true
                    }
                    console.log('Call PopMechanic.show for ' + popUpId);
                    window.PopMechanic.show(popUpId, true);
                }
            }
        } else if (params.wizardId) { 
            window.PopMechanic.onLoad = function() {
                console.log('PopMechanic onLoad');

                // Check form
                const form = PopMechanic.getModel(popUpId);
                console.log('Call quizzes.show for ' + params.wizardId);
                mindbox("quizzes.show", { id: params.wizardId });
            }
        } else {
            console.log('popUpId and wizardId are not set');
            sendToSdk('close', 'popUpId is not set');
        }

        window.PopMechanic.onFormShow = function(data) {
            window.isPopUpFormShown = true;
            console.log('PopMechanic onFormShow: ' + data.form.id);
            if (typeof window.trySendInit === 'function') {
                window.trySendInit();
            }
        };

        window.PopMechanic.onFormClose = function(success, data) {
            console.log('PopMechanic onFormClose: ' + window.stringify(data));
            sendToSdk('hide', 'final');
            setTimeout(() => {
                sendToSdk('close', 'final');
            }, 1000)
        };

        window.PopMechanic.onFormError = function(data) {
            console.log('PopMechanic onFormError: ' + window.stringify(data));
            sendToSdk('close', 'error');
        };

        mindbox = window.mindbox || function() { mindbox.queue.push(arguments); };
        mindbox.queue = mindbox.queue || [];
        mindbox('create', {
            endpointId: endpointId,
            deviceUUID: deviceUuid
        });
    }
    
</script>

<script>
    const BRIDGE_VERSION = 1;

    function generateBridgeId() {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
            return window.crypto.randomUUID();
        }
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    function postBridgeMessage(message) {
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.SdkBridge) {
            window.webkit.messageHandlers.SdkBridge.postMessage(message);
        } else if (window.__originalConsoleLog) {
            window.__originalConsoleLog('SdkBridge is not found');
        }
    }

    function sendBridgeRequest(action, payload) {
        const message = {
            version: BRIDGE_VERSION,
            type: 'request',
            action: action,
            payload: payload ?? null,
            id: generateBridgeId(),
            timestamp: Date.now()
        };
        postBridgeMessage(message);
        return message.id;
    }

    function sendBridgeResponse(requestMessage, payload, actionOverride) {
        if (!requestMessage || !requestMessage.id) {
            console.log('Bridge response skipped: missing request id');
            return;
        }
        const message = {
            version: BRIDGE_VERSION,
            type: 'response',
            action: actionOverride ?? requestMessage.action,
            payload: payload ?? null,
            id: requestMessage.id,
            timestamp: Date.now()
        };
        postBridgeMessage(message);
    }

    window.receiveFromSDK = function(raw) {
        let message;

        try {
            message = typeof raw === 'string' ? JSON.parse(raw) : raw;
        } catch (e) {
            console.log('Invalid message from SDK:', raw);
            return;
        }

        if (message.type === 'request' && message.action === 'alert') {
            document.documentElement.style.backgroundColor = 'yellow';
            document.body.style.backgroundColor = 'yellow';

            if (message.payload) {
                const banner = document.getElementById('__sdk_alert__') || (function () {
                    const el = document.createElement('div');
                    el.id = '__sdk_alert__';
                    el.style.position = 'fixed';
                    el.style.top = '0';
                    el.style.left = '0';
                    el.style.right = '0';
                    el.style.padding = '12px';
                    el.style.fontFamily = 'system-ui, -apple-system, sans-serif';
                    el.style.fontSize = '14px';
                    el.style.background = 'rgba(0,0,0,0.8)';
                    el.style.color = 'white';
                    el.style.zIndex = '9999';
                    document.body.appendChild(el);
                    return el;
                })();

                banner.textContent = String(message.payload);
            }

            sendBridgeResponse(message, {
                receivedPayload: message.payload ?? null,
                pageUrl: window.location.href
            }, 'js.alertDisplayed');
        }
    };
</script>
