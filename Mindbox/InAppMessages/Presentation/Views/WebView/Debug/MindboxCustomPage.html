<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mindbox Custom Page</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #0f0f12;
      color: #ffffff;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      flex-direction: column;
      gap: 8px;
      padding: 16px 20px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .badge {
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      margin: 4px 0 6px 0;
    }

    .history-btn {
      margin: 2px 0 6px 0;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 12px;
    }

    .block-title {
      width: 100%;
      max-width: 520px;
      font-size: 11px;
      opacity: 0.55;
      margin: 2px 0 4px 0;
    }

    .block {
      width: 100%;
      max-width: 520px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      min-height: 100px;
      max-height: 200px;
      overflow-y: auto;
    }

    .controls {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
    }

    .controls input,
    .controls textarea {
      width: 100%;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #fff;
      padding: 8px 10px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px;
    }

    .controls textarea {
      resize: vertical;
      min-height: 56px;
    }

    .divider {
      width: 100%;
      max-width: 520px;
      height: 1px;
      margin: 6px 0 8px 0;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
    }

    .mode-switch {
      width: 100%;
      max-width: 520px;
      display: flex;
      gap: 8px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }

    .mode-btn.active {
      background: #2563eb;
      border-color: #2563eb;
    }

    .controls button {
      margin-top: 2px;
      padding: 9px;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }

    .green { color: #4ade80; }
    .yellow { color: #facc15; }
    .dim { opacity: 0.6; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Mindbox</div>
    <div class="title">Custom HTML Page</div>
    <button id="historyBtn" class="history-btn">Logs history</button>

    <div id="historyBlock" class="block" style="display:none;">
      <div id="historyContent" class="dim">No logs yet...</div>
    </div>

    <div class="block-title">SDK → JS (receiveFromSDK)</div>
    <div class="block">
      <div id="incoming" class="dim">Waiting...</div>
    </div>

    <div class="block-title">JS → SDK (sendToSDK)</div>
    <div class="block">
      <div id="outgoing" class="dim">Waiting...</div>
    </div>

    <div class="divider"></div>

    <div class="mode-switch">
      <button type="button" class="mode-btn active" data-mode="request">request</button>
      <button type="button" class="mode-btn" data-mode="response">response</button>
    </div>

    <div class="controls">
      <input id="actionInput" placeholder="action" autocapitalize="none" autocorrect="off" spellcheck="false" />
      <textarea id="payloadInput">{}</textarea>
      <button id="sendBtn">sendToSDK</button>
    </div>
  </div>

  <script>
    const historyBtn = document.getElementById('historyBtn');
    const historyBlock = document.getElementById('historyBlock');
    const historyContent = document.getElementById('historyContent');

    const incomingEl = document.getElementById('incoming');
    const outgoingEl = document.getElementById('outgoing');
    const actionInput = document.getElementById('actionInput');
    const payloadInput = document.getElementById('payloadInput');
    const sendBtn = document.getElementById('sendBtn');

    let currentModeValue = 'request';
    let showHistory = false;
    const logHistory = [];

    window.sdkBridgeParams = {};
    window.SdkBridge = {
      receiveParam: function (paramName) {
        if (typeof paramName !== 'string') return;
        return window.sdkBridgeParams[paramName];
      }
    };

    function pushHistory(direction, message) {
      logHistory.push({ direction, message });
      if (showHistory) {
        renderHistory();
      }
    }

    function renderHistory() {
      const all = logHistory.map(entry => {
        const prefix = entry.direction === 'in' ? 'SDK → JS' : 'JS → SDK';
        return `${prefix}\n${stripHtml(formatMessage(entry.message))}`;
      }).join('\n\n');

      historyContent.textContent = all || 'No logs yet...';
    }

    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || '';
    }

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentModeValue = btn.dataset.mode;
      });
    });

    function currentMode() {
      return currentModeValue;
    }

    function formatMessage(obj) {
      if (!obj || typeof obj !== 'object') return String(obj);

      const lines = [];

      if ('action' in obj) {
        lines.push(`<span class="green">action</span>: <span class="green">${obj.action}</span>`);
      }

      if ('id' in obj) {
        lines.push(`<span class="yellow">id</span>: <span class="yellow">${obj.id}</span>`);
      }

      for (const [k, v] of Object.entries(obj)) {
        if (k === 'action' || k === 'id') continue;
        lines.push(`${k}: ${escapeHtml(JSON.stringify(v, null, 2))}`);
      }

      return lines.join('\n');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    const BRIDGE_VERSION = 1;

    function generateBridgeId() {
      if (window.crypto && typeof window.crypto.randomUUID === 'function') {
        return window.crypto.randomUUID();
      }
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function buildBridgeMessage({ type, action, payload, id }) {
      return {
        version: BRIDGE_VERSION,
        type: type ?? 'request',
        action,
        payload: payload ?? null,
        id: id ?? generateBridgeId(),
        timestamp: Date.now()
      };
    }

    function sendToSdk(bridgeMessage) {
      pushHistory('out', bridgeMessage);

      outgoingEl.classList.remove('dim', 'error');
      outgoingEl.innerHTML = formatMessage(bridgeMessage);

      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.SdkBridge) {
        window.webkit.messageHandlers.SdkBridge.postMessage(bridgeMessage);
      } else if (window.SdkBridge && typeof window.SdkBridge.postMessage === 'function') {
        window.SdkBridge.postMessage(bridgeMessage);
      } else {
        outgoingEl.classList.add('error');
        outgoingEl.textContent = 'SdkBridge not found';
      }
    }

    function handleStartMessage(message) {
      if (message && message.payload && typeof message.payload === 'object') {
        window.sdkBridgeParams = message.payload;
      } else {
        window.sdkBridgeParams = {};
      }

      if (message && message.id) {
        sendToSdk(buildBridgeMessage({
          type: 'response',
          action: message.action,
          payload: { status: 'ok' },
          id: message.id
        }));
      }
      
    }

    window.receiveFromSDK = function (raw) {
      let message;

      try {
        message = typeof raw === 'string' ? JSON.parse(raw) : raw;
      } catch {
        incomingEl.classList.remove('dim');
        incomingEl.textContent = String(raw);
        return;
      }

      pushHistory('in', message);

      incomingEl.classList.remove('dim');
      incomingEl.innerHTML = formatMessage(message);

      if (message && message.action === 'start' && message.type === 'request') {
        handleStartMessage(message);
      }
    };

    sendBtn.addEventListener('click', () => {
      const action = actionInput.value.trim();
      const raw = payloadInput.value.trim();

      if (!action) {
        outgoingEl.classList.remove('dim');
        outgoingEl.classList.add('error');
        outgoingEl.textContent = 'Action is required';
        return;
      }

      let payload = raw;
      if (raw) {
        try { payload = JSON.parse(raw); } catch {}
      }

      const message = buildBridgeMessage({
        type: currentMode(),
        action,
        payload
      });

      sendToSdk(message);
    });

    historyBtn.addEventListener('click', () => {
      showHistory = !showHistory;
      historyBtn.textContent = showHistory ? 'Hide history' : 'Logs history';

      if (showHistory) {
        renderHistory();
        historyBlock.style.display = 'block';
      } else {
        historyBlock.style.display = 'none';
      }
    });

    sendToSdk(buildBridgeMessage({
      type: 'request',
      action: 'ready',
      payload: 'html-loaded'
    }));

    function copyTextFromElement(el) {
      const text = el.innerText || el.textContent;
      if (!text) return;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text);
      } else {
        const tmp = document.createElement('textarea');
        tmp.value = text;
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand('copy');
        document.body.removeChild(tmp);
      }
    }

    incomingEl.addEventListener('click', () => copyTextFromElement(incomingEl));
    outgoingEl.addEventListener('click', () => copyTextFromElement(outgoingEl));
    historyContent.addEventListener('click', () => copyTextFromElement(historyContent));
  </script>
</body>
</html>
